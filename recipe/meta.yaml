{% set name = "gatiab" %}
{% set version = "1.1.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/gatiab-{{ version }}.tar.gz
  sha256: 9f7892ef28ce94a73682777c0cab655d0690305346d30e252ecb8141456a5824

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=42
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.26.4
    - xarray >=2024.7.0
    - netcdf4 >=1.7.1
    - scipy >=1.13.1
    - tqdm >=4.66.5

test:
  imports:
    - gatiab
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/hygeos/gatiab
  summary: Gasous Absorption Transmissions at Instrument Averaged Bands
  license: LicenseRef-HYGEOS-gatiab
  license_url: https://github.com/hygeos/gatiab/blob/master/LICENSE.txt
  license_file: LICENSE.txt
  dev_url: https://github.com/hygeos/gatiab

extra:
  recipe-maintainers:
    - Mustapha-hygeos
